global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@stickyextension.dev'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'
  routes:
  - match:
      severity: critical
    receiver: 'critical-alerts'
  - match:
      severity: warning
    receiver: 'warning-alerts'

receivers:
- name: 'web.hook'
  webhook_configs:
  - url: 'http://localhost:5001/'

- name: 'critical-alerts'
  email_configs:
  - to: 'oncall@stickyextension.dev'
    subject: '[CRITICAL] Extension Alert'
    body: |
      Alert: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
      
  slack_configs:
  - api_url: '{{ .SlackWebhookURL }}'
    channel: '#critical-alerts'
    title: 'Critical Extension Alert'

- name: 'warning-alerts'
  email_configs:
  - to: 'team@stickyextension.dev'
    subject: '[WARNING] Extension Alert'
    body: |
      Alert: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}