apiVersion: v1
kind: Service
metadata:
  name: sticky-scroll-api-service
  namespace: sticky-scroll
  labels:
    app: sticky-scroll-api
spec:
  selector:
    app: sticky-scroll-api
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: sticky-scroll-metrics
  namespace: sticky-scroll
  labels:
    app: sticky-scroll-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: sticky-scroll-api
  ports:
  - name: metrics
    port: 3000
    targetPort: 3000
    protocol: TCP
  type: ClusterIP